<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contractor Timesheet Generator</title>
<style>
    :root {
        --accent: #2563eb;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-400: #9ca3af;
        --gray-500: #6b7280;
        --gray-700: #374151;
        --gray-900: #111827;
        --green: #16a34a;
        --red: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--gray-50);
        color: var(--gray-900);
        line-height: 1.5;
    }

    /* ===== APP LAYOUT ===== */
    .app-bar {
        background: white;
        border-bottom: 1px solid var(--gray-200);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .app-bar h1 {
        font-size: 1.1rem;
        font-weight: 600;
    }
    .app-bar a {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.85rem;
    }

    .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
    }

    .panels {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 24px;
        align-items: start;
    }

    @media (max-width: 768px) {
        .panels { grid-template-columns: 1fr; }
    }

    /* ===== EDITOR PANEL ===== */
    .editor {
        background: white;
        border: 1px solid var(--gray-200);
        border-radius: 12px;
        padding: 20px;
    }
    .editor h2 {
        font-size: 0.95rem;
        font-weight: 600;
        margin-bottom: 16px;
        color: var(--gray-700);
    }

    .form-group {
        margin-bottom: 14px;
    }
    .form-group label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--gray-500);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
    }
    .form-group input, .form-group select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--gray-200);
        border-radius: 8px;
        font-size: 0.85rem;
        background: white;
        color: var(--gray-900);
    }
    .form-group input:focus, .form-group select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    /* Time entries editor */
    .time-entries {
        margin-top: 16px;
    }
    .time-entry {
        display: grid;
        grid-template-columns: 1fr 70px 32px;
        gap: 6px;
        align-items: center;
        margin-bottom: 4px;
    }
    .time-entry input {
        padding: 6px 8px;
        border: 1px solid var(--gray-200);
        border-radius: 6px;
        font-size: 0.8rem;
    }
    .time-entry input:focus {
        outline: none;
        border-color: var(--accent);
    }
    .remove-btn {
        background: none;
        border: none;
        color: var(--gray-400);
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0;
        line-height: 1;
    }
    .remove-btn:hover { color: var(--red); }

    .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
    }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
    .btn-outline {
        background: white;
        border: 1px solid var(--gray-200);
        color: var(--gray-700);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-primary {
        background: var(--accent);
        color: white;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-green {
        background: var(--green);
        color: white;
    }
    .btn-green:hover { background: #15803d; }

    .btn-row {
        display: flex;
        gap: 8px;
        margin-top: 16px;
        flex-wrap: wrap;
    }

    /* ===== SIGNATURE ===== */
    .sig-section {
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid var(--gray-200);
    }
    .sig-section h3 {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--gray-500);
        margin-bottom: 8px;
    }
    .sig-canvas-wrap {
        border: 2px dashed var(--gray-200);
        border-radius: 8px;
        position: relative;
        background: white;
    }
    .sig-canvas-wrap.has-sig {
        border-style: solid;
        border-color: var(--green);
    }
    #sig-canvas {
        display: block;
        width: 100%;
        cursor: crosshair;
        border-radius: 6px;
    }
    .sig-preview {
        padding: 8px;
        text-align: center;
    }
    .sig-preview img {
        max-height: 60px;
    }
    .sig-hint {
        font-size: 0.7rem;
        color: var(--gray-400);
        text-align: center;
        padding: 4px;
    }

    /* ===== PREVIEW PANEL ===== */
    .preview-wrap {
        background: white;
        border: 1px solid var(--gray-200);
        border-radius: 12px;
        overflow: hidden;
    }
    .preview-toolbar {
        padding: 10px 16px;
        border-bottom: 1px solid var(--gray-200);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--gray-50);
    }
    .preview-toolbar span {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--gray-500);
    }

    /* ===== THE ACTUAL TIMESHEET (printable) ===== */
    .timesheet {
        padding: 48px;
        font-family: 'Times New Roman', Times, serif;
        color: #000;
        background: white;
        min-height: 11in;
    }

    .ts-title {
        font-size: 14pt;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .ts-info {
        margin-bottom: 20px;
    }
    .ts-info-row {
        display: grid;
        grid-template-columns: 160px 1fr;
        font-size: 11pt;
        line-height: 1.8;
    }
    .ts-info-label {
        font-weight: bold;
    }

    .ts-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11pt;
        margin-bottom: 10px;
    }
    .ts-table thead th {
        text-align: left;
        font-weight: bold;
        padding: 4px 12px 4px 0;
        border-bottom: 1.5px solid #000;
        white-space: nowrap;
    }
    .ts-table tbody td {
        padding: 3px 12px 3px 0;
        white-space: nowrap;
    }
    .ts-table .col-date { width: 120px; }
    .ts-table .col-hours { width: 120px; text-align: center; }
    .ts-table .col-rate { width: 100px; text-align: center; }
    .ts-table .col-amount { width: 100px; text-align: right; }
    .ts-table tbody td.col-hours { text-align: center; }
    .ts-table tbody td.col-rate { text-align: center; }
    .ts-table tbody td.col-amount { text-align: right; }

    .ts-table tfoot td {
        padding: 6px 12px 4px 0;
        border-top: 1.5px solid #000;
        font-weight: bold;
    }
    .ts-table tfoot td.col-hours { text-align: center; }
    .ts-table tfoot td.col-amount { text-align: right; }

    .ts-signature {
        margin-top: 30px;
        display: flex;
        align-items: flex-end;
        gap: 12px;
    }
    .ts-sig-img {
        max-height: 50px;
    }
    .ts-sig-date {
        font-size: 11pt;
        font-family: 'Times New Roman', Times, serif;
    }

    /* ===== PRINT STYLES ===== */
    @media print {
        body { background: white; }
        .app-bar, .editor, .preview-toolbar, .no-print { display: none !important; }
        .container { max-width: none; padding: 0; }
        .panels { display: block; }
        .preview-wrap { border: none; border-radius: 0; }
        .timesheet { padding: 0.75in 1in; min-height: auto; }
    }
</style>
</head>
<body>

<div class="app-bar">
    <h1>Contractor Timesheet Generator</h1>
    <a href="portal.html">← Back to Portal</a>
</div>

<div class="container">
    <div class="panels">
        <!-- LEFT: Editor -->
        <div class="editor no-print">
            <h2>Timesheet Details</h2>

            <div class="form-group">
                <label>Contractor Name</label>
                <input type="text" id="contractor-name" value="Michael Dulin" oninput="renderPreview()">
            </div>

            <div class="form-group">
                <label>Client</label>
                <select id="client-select" onchange="onClientChange()">
                    <option value="custom">Custom / flat hourly</option>
                    <option value="avance">Avance Care — $250/hr, min 10/wk</option>
                    <option value="triad">Triad (Carrboro Family) — $150 first 16/wk, then $200</option>
                    <option value="unc">UNC Charlotte — flat $2,500/quarter</option>
                </select>
                <div id="client-note" style="font-size:0.7rem;color:var(--gray-500);margin-top:4px;"></div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Month</label>
                    <input type="month" id="ts-month" oninput="renderPreview()">
                </div>
                <div class="form-group">
                    <label>Hourly Rate ($)</label>
                    <input type="number" id="hourly-rate" value="150" oninput="renderPreview()">
                </div>
            </div>

            <div class="time-entries">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <label style="margin:0;font-size:0.75rem;font-weight:500;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.05em;">Work Days</label>
                    <button class="btn btn-sm btn-outline" onclick="addEntry()">+ Add Day</button>
                </div>
                <div id="entry-list"></div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--gray-200);font-size:0.8rem;font-weight:600;">
                    <span>Total</span>
                    <span id="total-summary">0 hrs · $0</span>
                </div>
            </div>

            <!-- Signature Section -->
            <div class="sig-section">
                <h3>Signature</h3>
                <div id="sig-area">
                    <div class="sig-canvas-wrap" id="sig-wrap">
                        <canvas id="sig-canvas" height="80"></canvas>
                        <div class="sig-hint" id="sig-hint">Draw your signature above</div>
                    </div>
                    <div style="display:flex;gap:6px;margin-top:6px;">
                        <button class="btn btn-sm btn-outline" onclick="clearSignature()">Clear</button>
                        <button class="btn btn-sm btn-primary" onclick="saveSignature()">Save Signature</button>
                    </div>
                </div>
                <div id="sig-saved" style="display:none;">
                    <div class="sig-canvas-wrap has-sig">
                        <div class="sig-preview">
                            <img id="sig-saved-img" alt="Saved signature">
                        </div>
                    </div>
                    <div style="display:flex;gap:6px;margin-top:6px;">
                        <button class="btn btn-sm btn-outline" onclick="editSignature()">Redraw</button>
                        <span style="font-size:0.7rem;color:var(--green);display:flex;align-items:center;gap:4px;">✓ Signature saved</span>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" onclick="window.print()">🖨 Print / Save PDF</button>
                <button class="btn btn-green" onclick="createInvoice()">Create Invoice</button>
            </div>
        </div>

        <!-- RIGHT: Preview -->
        <div class="preview-wrap">
            <div class="preview-toolbar no-print">
                <span>Preview</span>
                <span id="preview-status" style="color:var(--green);">Live</span>
            </div>
            <div class="timesheet" id="timesheet-preview">
                <!-- Rendered by JS -->
            </div>
        </div>
    </div>
</div>

<script>
    // ===== STATE =====
    let entries = [];
    let signatureDataUrl = null;

    // ===== CLIENT BILLING RULES =====
    const CLIENTS = {
      custom: { label:'Custom / flat hourly', type:'hourly', desc:'Hourly rate above × total hours.' },
      avance: { label:'Avance Care', type:'weekly-min', rate:250, minHrs:10, desc:'$250/hr, minimum 10 hr/week.' },
      triad:  { label:'Triad (Carrboro Family)', type:'weekly-tier', t1Rate:150, t1Hrs:16, t2Rate:200, desc:'$150/hr first 16 hr/week, $200/hr above.' },
      unc:    { label:'UNC Charlotte', type:'flat', amount:2500, note:'Flat $2,500 / quarter', desc:'Flat $2,500 per quarter (hours optional).' },
    };
    function currentClientId(){ const el=document.getElementById('client-select'); return el ? el.value : 'custom'; }
    function weekKeyOf(dateStr){ const d=new Date(dateStr+'T12:00:00'); const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return d.toISOString().slice(0,10); }
    function computeBilling(clientId, ents, manualRate){
      const c = CLIENTS[clientId] || CLIENTS.custom;
      const valid = (ents||[]).filter(e=>e.date && parseFloat(e.hours)>0);
      const totalHrs = valid.reduce((s,e)=>s+(parseFloat(e.hours)||0),0);
      if (c.type==='flat') return { totalHrs, amount:c.amount, flat:true, weeks:[] };
      if (c.type==='hourly') return { totalHrs, amount: Math.round(totalHrs*(manualRate||0)), weeks:[] };
      const byWeek={};
      for (const e of valid){ const k=weekKeyOf(e.date); byWeek[k]=(byWeek[k]||0)+(parseFloat(e.hours)||0); }
      const weeks = Object.entries(byWeek).sort().map(function(pair){
        const wk=pair[0], hrs=pair[1]; let amt, detail;
        if (c.type==='weekly-min'){ const billed=Math.max(hrs,c.minHrs); amt=billed*c.rate; detail=hrs.toFixed(1)+' hr → '+billed.toFixed(1)+' @ $'+c.rate+(hrs<c.minHrs?' (min)':''); }
        else { const t1=Math.min(hrs,c.t1Hrs), t2=Math.max(0,hrs-c.t1Hrs); amt=t1*c.t1Rate+t2*c.t2Rate; detail=t1.toFixed(1)+'@$'+c.t1Rate+(t2>0?(' + '+t2.toFixed(1)+'@$'+c.t2Rate):''); }
        return { wk, hrs, amt:Math.round(amt), detail };
      });
      return { totalHrs, amount: weeks.reduce((s,w)=>s+w.amt,0), weeks };
    }
    function onClientChange(){
      const c = CLIENTS[currentClientId()];
      const note = document.getElementById('client-note');
      const rateInput = document.getElementById('hourly-rate');
      const rateGroup = rateInput ? rateInput.closest('.form-group') : null;
      if (note) note.textContent = c.desc || '';
      if (rateGroup) rateGroup.style.display = (currentClientId()==='custom') ? '' : 'none';
      renderPreview();
    }

    // Try to restore saved signature from session
    try {
        const saved = sessionStorage.getItem('ts_signature');
        if (saved) signatureDataUrl = saved;
    } catch(e) {}

    // ===== INIT =====
    function init() {
        // Default to current month
        const now = new Date();
        document.getElementById('ts-month').value = now.toISOString().slice(0, 7);

        // Start with a few blank entries
        for (let i = 0; i < 5; i++) addEntry();

        // Show saved signature if exists
        if (signatureDataUrl) {
            showSavedSignature();
        }

        initSignaturePad();
        renderPreview();
        onClientChange();
    }

    // ===== TIME ENTRIES =====
    function addEntry(date = '', hours = '') {
        const idx = entries.length;
        entries.push({ date, hours });
        renderEntries();
        renderPreview();
    }

    function removeEntry(idx) {
        entries.splice(idx, 1);
        renderEntries();
        renderPreview();
    }

    function renderEntries() {
        const list = document.getElementById('entry-list');
        list.innerHTML = entries.map((e, i) => `
            <div class="time-entry">
                <input type="date" value="${e.date}" onchange="entries[${i}].date=this.value; renderPreview()">
                <input type="number" step="0.5" min="0" max="24" placeholder="Hrs" value="${e.hours}" onchange="entries[${i}].hours=parseFloat(this.value)||0; renderPreview()">
                <button class="remove-btn" onclick="removeEntry(${i})" title="Remove">×</button>
            </div>
        `).join('');
        updateSummary();
    }

    function updateSummary() {
        const rate = parseFloat(document.getElementById('hourly-rate').value) || 0;
        const bill = computeBilling(currentClientId(), entries, rate);
        document.getElementById('total-summary').textContent = `${bill.totalHrs.toFixed(1)} hrs · $${bill.amount.toLocaleString()}`;
    }

    // ===== SIGNATURE PAD =====
    let sigCanvas, sigCtx, sigDrawing = false;

    function initSignaturePad() {
        sigCanvas = document.getElementById('sig-canvas');
        sigCtx = sigCanvas.getContext('2d');

        // Set canvas internal resolution
        const rect = sigCanvas.getBoundingClientRect();
        sigCanvas.width = rect.width;
        sigCanvas.height = 80;

        sigCtx.strokeStyle = '#000';
        sigCtx.lineWidth = 2;
        sigCtx.lineCap = 'round';
        sigCtx.lineJoin = 'round';

        sigCanvas.addEventListener('mousedown', sigStart);
        sigCanvas.addEventListener('mousemove', sigMove);
        sigCanvas.addEventListener('mouseup', sigEnd);
        sigCanvas.addEventListener('mouseleave', sigEnd);

        // Touch support
        sigCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); sigStart(e.touches[0]); });
        sigCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); sigMove(e.touches[0]); });
        sigCanvas.addEventListener('touchend', sigEnd);
    }

    function sigStart(e) {
        sigDrawing = true;
        document.getElementById('sig-hint').style.display = 'none';
        const rect = sigCanvas.getBoundingClientRect();
        sigCtx.beginPath();
        sigCtx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function sigMove(e) {
        if (!sigDrawing) return;
        const rect = sigCanvas.getBoundingClientRect();
        sigCtx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        sigCtx.stroke();
    }

    function sigEnd() {
        sigDrawing = false;
    }

    function clearSignature() {
        sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
        document.getElementById('sig-hint').style.display = 'block';
        signatureDataUrl = null;
        renderPreview();
    }

    function saveSignature() {
        // Trim the signature canvas to just the drawn area
        const trimmed = trimCanvas(sigCanvas);
        if (!trimmed) {
            alert('Please draw your signature first.');
            return;
        }
        signatureDataUrl = trimmed;
        try { sessionStorage.setItem('ts_signature', signatureDataUrl); } catch(e) {}
        showSavedSignature();
        renderPreview();
    }

    function showSavedSignature() {
        document.getElementById('sig-area').style.display = 'none';
        document.getElementById('sig-saved').style.display = 'block';
        document.getElementById('sig-saved-img').src = signatureDataUrl;
    }

    function editSignature() {
        document.getElementById('sig-area').style.display = 'block';
        document.getElementById('sig-saved').style.display = 'none';
        signatureDataUrl = null;
        clearSignature();
        initSignaturePad();
    }

    // Trim whitespace from canvas and return data URL
    function trimCanvas(canvas) {
        const ctx = canvas.getContext('2d');
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imgData.data;
        let top = canvas.height, bottom = 0, left = canvas.width, right = 0;
        let hasContent = false;

        for (let y = 0; y < canvas.height; y++) {
            for (let x = 0; x < canvas.width; x++) {
                const a = pixels[(y * canvas.width + x) * 4 + 3];
                if (a > 0) {
                    hasContent = true;
                    if (y < top) top = y;
                    if (y > bottom) bottom = y;
                    if (x < left) left = x;
                    if (x > right) right = x;
                }
            }
        }
        if (!hasContent) return null;

        const pad = 4;
        top = Math.max(0, top - pad);
        bottom = Math.min(canvas.height - 1, bottom + pad);
        left = Math.max(0, left - pad);
        right = Math.min(canvas.width - 1, right + pad);

        const trimmed = document.createElement('canvas');
        trimmed.width = right - left + 1;
        trimmed.height = bottom - top + 1;
        trimmed.getContext('2d').putImageData(
            ctx.getImageData(left, top, trimmed.width, trimmed.height), 0, 0
        );
        return trimmed.toDataURL('image/png');
    }

    // ===== RENDER PREVIEW =====
    function renderPreview() {
        const name = document.getElementById('contractor-name').value || 'Michael Dulin';
        const monthVal = document.getElementById('ts-month').value;
        const rate = parseFloat(document.getElementById('hourly-rate').value) || 0;
        const clientId = currentClientId();
        const client = CLIENTS[clientId];
        const showRate = clientId === 'custom';

        let monthLabel = '—';
        if (monthVal) {
            const [y, m] = monthVal.split('-');
            const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            monthLabel = `${monthNames[parseInt(m) - 1]}-${y.slice(2)}`;
        }

        const validEntries = entries.filter(e => e.date && parseFloat(e.hours) > 0).sort((a, b) => a.date.localeCompare(b.date));
        const bill = computeBilling(clientId, validEntries, rate);
        const totalHrs = bill.totalHrs;

        let signDate = '';
        if (validEntries.length) { const d = new Date(validEntries[validEntries.length - 1].date + 'T00:00:00'); signDate = `${d.getMonth() + 1}/${d.getDate()}/${d.getFullYear()}`; }

        const el = document.getElementById('timesheet-preview');
        el.innerHTML = `
            <div class="ts-title">Contractor Hours${clientId !== 'custom' ? ' — ' + client.label : ''}</div>
            <div class="ts-info">
                <div class="ts-info-row"><span class="ts-info-label">Contractor Name</span><span>${name}</span></div>
                <div class="ts-info-row"><span class="ts-info-label">Month</span><span>${monthLabel}</span></div>
            </div>
            <table class="ts-table">
                <thead><tr><th class="col-date">Work day</th><th class="col-hours">Hours</th>${showRate ? '<th class="col-rate">Rate</th><th class="col-amount">Amount</th>' : '<th class="col-amount">&nbsp;</th>'}</tr></thead>
                <tbody>
                    ${validEntries.map(e => {
                        const hrs = parseFloat(e.hours) || 0;
                        const d = new Date(e.date + 'T00:00:00');
                        const ds = `${d.getMonth() + 1}/${d.getDate()}/${d.getFullYear()}`;
                        return `<tr><td class="col-date">${ds}</td><td class="col-hours">${hrs.toFixed(1)}</td>${showRate ? `<td class="col-rate">$&nbsp;&nbsp;${rate}</td><td class="col-amount">$&nbsp;&nbsp;${(hrs * rate).toLocaleString()}</td>` : '<td class="col-amount"></td>'}</tr>`;
                    }).join('')}
                </tbody>
                <tfoot><tr><td><strong>Total</strong></td><td class="col-hours"><strong>${totalHrs.toFixed(1)}</strong></td>${showRate ? '<td></td>' : ''}<td class="col-amount"><strong>$&nbsp;&nbsp;${bill.amount.toLocaleString()}</strong></td></tr></tfoot>
            </table>
            ${bill.weeks && bill.weeks.length ? `<div style="margin-top:10px;font-size:0.8rem;"><div style="font-weight:600;margin-bottom:4px;">Weekly billing · ${client.label}</div>${bill.weeks.map(w => `<div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--gray-200);padding:3px 0;"><span>Wk of ${w.wk} · ${w.detail}</span><span>$${w.amt.toLocaleString()}</span></div>`).join('')}</div>` : ''}
            ${bill.flat ? `<div style="margin-top:10px;font-size:0.8rem;color:var(--gray-500);">${client.note}</div>` : ''}
            ${signatureDataUrl ? `<div class="ts-signature"><img src="${signatureDataUrl}" class="ts-sig-img" alt="Signature"><span class="ts-sig-date">${signDate}</span></div>` : ''}
        `;
        updateSummary();
    }

    // ===== CREATE INVOICE (link to portal) =====
    function createInvoice() {
        const monthVal = document.getElementById('ts-month').value;
        const rate = parseFloat(document.getElementById('hourly-rate').value) || 0;
        const clientId = currentClientId();
        const validEntries = entries.filter(e => e.date && parseFloat(e.hours) > 0).sort((a, b) => a.date.localeCompare(b.date));
        const bill = computeBilling(clientId, validEntries, rate);
        if (clientId !== 'unc' && !validEntries.length) { alert('Add at least one work day first.'); return; }
        let lineItems;
        if (bill.flat) {
            lineItems = [{ date: (monthVal || '') + '-01', activity: 'Consulting (retainer)', description: CLIENTS[clientId].note, quantity: 1, rate: bill.amount, amount: bill.amount }];
        } else if (bill.weeks && bill.weeks.length) {
            lineItems = bill.weeks.map(w => ({ date: w.wk, activity: 'Consulting Services', description: `Week of ${w.wk}: ${w.detail}`, quantity: w.hrs, rate: 0, amount: w.amt }));
        } else {
            lineItems = validEntries.map(e => { const hrs = parseFloat(e.hours) || 0; return { date: e.date, activity: 'Consulting Services', description: `${hrs} hours @ $${rate}/hr`, quantity: hrs, rate: rate, amount: hrs * rate }; });
        }
        const invoiceData = { clientId, clientLabel: CLIENTS[clientId].label, month: monthVal, lineItems, total: bill.amount, totalHours: bill.totalHrs };
        try {
            sessionStorage.setItem('pending_invoice', JSON.stringify(invoiceData));
            alert(`Invoice prepared: ${bill.totalHrs.toFixed(1)} hrs → $${bill.amount.toLocaleString()} (${CLIENTS[clientId].label}). Open the portal to finalize.`);
        } catch (e) { alert('Invoice ready. Open portal.html to create the invoice.'); }
    }

    // ===== QUICK-FILL from common patterns =====
    function quickFill(data) {
        entries = data.map(d => ({ date: d[0], hours: d[1] }));
        renderEntries();
        renderPreview();
    }

    // Start
    init();
</script>
</body>
